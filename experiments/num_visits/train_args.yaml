# Training args for the num_visits experiment (single-parameter redshift model)

bb:
  cosmo_model: bb
  mlflow_exp: base
  pyro_seed: 1
  nf_seed: 1
  prior_args_path: prior_args_gamma.yaml
  flow_type: NAF
  transform_input: true
  input_transform_type: marginal
  activation: elu
  n_transforms: 4
  cond_hidden_size: 128
  cond_n_layers: 3
  mnn_hidden_size: 128
  mnn_n_layers: 3
  mnn_signal: 32
  nf_transform: affine
  spline_bins: 16
  design_args_path: design_args.yaml
  total_steps: 10000
  optimizer: Adam
  initial_lr: 0.0001
  final_lr: 0.00001
  grad_clip: 0.0
  warmup_fraction: 0.05
  scheduler_type: cosine
  n_cycles: 1
  gamma: 0.1
  step_freq: 1
  checkpoint_step_freq: 1000
  n_particles_per_device: 10
  temperature: 10000
  mag_err_cap: 10
  central_params:
    z: 1.0
  condition_design: true
  log_nominal_area: false
  verbose: true

bb_temp:
  cosmo_model: bb_temp
  mlflow_exp: base_temp
  pyro_seed: 1
  nf_seed: 1
  prior_args_path: prior_args_gamma_temp.yaml
  flow_type: NAF
  transform_input: true
  input_transform_type: marginal
  activation: elu
  n_transforms: 4
  cond_hidden_size: 128
  cond_n_layers: 3
  mnn_hidden_size: 128
  mnn_n_layers: 3
  mnn_signal: 32
  nf_transform: affine
  spline_bins: 16
  design_args_path: design_args.yaml
  total_steps: 10000
  optimizer: Adam
  initial_lr: 0.0001
  final_lr: 0.00001
  grad_clip: 0.0
  warmup_fraction: 0.05
  scheduler_type: cosine
  n_cycles: 1
  gamma: 0.1
  step_freq: 1
  checkpoint_step_freq: 1000
  n_particles_per_device: 10
  mag_err_cap: 10
  central_params:
    z: 1.0
    T: 10000
  condition_design: true
  log_nominal_area: false
  verbose: true

empirical:
  cosmo_model: empirical
  mlflow_exp: empirical
  pyro_seed: 1
  nf_seed: 1
  prior_args_path: prior_args_empirical.yaml
  flow_type: NAF
  transform_input: true
  input_transform_type: joint
  transform_cosmo_params:
    - log_c_scale
    - z
  logit_flow_scale: 8.0
  activation: elu
  n_transforms: 4
  cond_hidden_size: 128
  cond_n_layers: 3
  mnn_hidden_size: 128
  mnn_n_layers: 3
  mnn_signal: 32
  nf_transform: affine
  spline_bins: 16
  design_args_path: design_args.yaml
  total_steps: 100000
  optimizer: Adam
  initial_lr: 0.0005
  final_lr: 0.00001
  grad_clip: 0.0
  warmup_fraction: 0.05
  scheduler_type: cosine
  n_cycles: 1
  gamma: 0.1
  step_freq: 1
  checkpoint_step_freq: 1000
  n_particles_per_device: 10
  mag_err_cap: 10
  cdf_bins: 5000
  cdf_samples: 1000000
  # KDE prior marginal modes (desi_eazy_empirical_prior_full); f7 uses median (bimodal)
  central_params:
    f1: 7.485695
    f2: -2.556071
    f3: -2.458513
    f4: -2.475593
    f5: -2.587700
    f6: -2.455915
    f7: 3.552354
    f8: -2.464153
    f9: -2.771274
    f10: -2.704496
    f11: -2.582472
    f12: -2.691376
    log_c_scale: 6.588856
    z: 0.926622
  condition_design: true
  log_nominal_area: false
  verbose: true
