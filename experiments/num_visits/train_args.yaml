# Training args for the num_visits experiment (single-parameter redshift model)

bb:
  cosmo_model: bb
  mlflow_exp: base
  pyro_seed: 1
  nf_seed: 1
  prior_args_path: prior_args_gamma.yaml
  flow_type: NAF
  transform_input: true
  activation: elu
  n_transforms: 4
  cond_hidden_size: 128
  cond_n_layers: 3
  mnn_hidden_size: 128
  mnn_n_layers: 3
  mnn_signal: 32
  nf_transform: affine
  spline_bins: 16
  design_args_path: design_args.yaml
  total_steps: 10000
  optimizer: Adam
  initial_lr: 0.0001
  final_lr: 0.00001
  grad_clip: 0.0
  warmup_fraction: 0.05
  scheduler_type: cosine
  n_cycles: 1
  gamma: 0.1
  step_freq: 1
  checkpoint_step_freq: 1000
  n_particles_per_device: 10
  temperature: 10000
  mag_err_cap: 10
  central_params:
    z: 1.0
  condition_design: true
  log_nominal_area: false
  verbose: true

bb_temp:
  cosmo_model: bb_temp
  mlflow_exp: base_temp
  pyro_seed: 1
  nf_seed: 1
  prior_args_path: prior_args_gamma_temp.yaml
  flow_type: NAF
  transform_input: true
  activation: elu
  n_transforms: 4
  cond_hidden_size: 128
  cond_n_layers: 3
  mnn_hidden_size: 128
  mnn_n_layers: 3
  mnn_signal: 32
  nf_transform: affine
  spline_bins: 16
  design_args_path: design_args.yaml
  total_steps: 10000
  optimizer: Adam
  initial_lr: 0.0001
  final_lr: 0.00001
  grad_clip: 0.0
  warmup_fraction: 0.05
  scheduler_type: cosine
  n_cycles: 1
  gamma: 0.1
  step_freq: 1
  checkpoint_step_freq: 1000
  n_particles_per_device: 10
  mag_err_cap: 10
  central_params:
    z: 1.0
    T: 10000
  condition_design: true
  log_nominal_area: false
  verbose: true

eazy_kde:
  cosmo_model: eazy_kde
  mlflow_exp: eazy_kde
  pyro_seed: 1
  nf_seed: 1
  prior_args_path: prior_args_eazy_kde.yaml
  flow_type: NAF
  transform_input: true
  # Only Gaussianize well-behaved marginals; f_k use tanh squash into NF (see sed_prior README).
  transform_cosmo_params:
    - log_c_scale
    - z
  logit_flow_scale: 8.0
  activation: elu
  n_transforms: 4
  cond_hidden_size: 128
  cond_n_layers: 3
  mnn_hidden_size: 128
  mnn_n_layers: 3
  mnn_signal: 32
  nf_transform: affine
  spline_bins: 16
  design_args_path: design_args.yaml
  total_steps: 10000
  optimizer: Adam
  initial_lr: 0.0001
  final_lr: 0.00001
  grad_clip: 0.0
  warmup_fraction: 0.05
  scheduler_type: cosine
  n_cycles: 1
  gamma: 0.1
  step_freq: 1
  checkpoint_step_freq: 1000
  n_particles_per_device: 10
  mag_err_cap: 10
  cdf_bins: 5000
  cdf_samples: 1000000
  central_params:
    z: 0.85
    log_c_scale: 7.0
    f1: 0.0
    f2: 0.0
    f3: 0.0
    f4: 0.0
    f5: 0.0
    f6: 0.0
    f7: 0.0
    f8: 0.0
    f9: 0.0
    f10: 0.0
    f11: 0.0
  condition_design: true
  log_nominal_area: false
  verbose: true
