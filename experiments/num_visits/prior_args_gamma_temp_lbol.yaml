# Blackbody prior with a free bolometric luminosity (cosmo_model: bb_temp_lbol).
# Same z / T priors as prior_args_gamma_temp.yaml, plus a uniform L_bol.
#
# L_bol is in L_sun and sets the SNR scale of the whole experiment: the emitting
# radius is back-solved from Stefan-Boltzmann so the source is a standard candle
# at each (T, L_bol). 1e9 is a dwarf galaxy (M_bol = -17.8) where the T signal is
# only ~0.5 sigma; L* is ~2-3e10, where it is ~15 sigma. The uniform range below
# straddles both so L_bol is a genuine nuisance rather than a fixed choice.
parameters:
  z:
    distribution:
      type: "gamma"
      shape: 3.0
      z_0: 0.3
    plot:
      lower: 0.1
      upper: 3.0
    latex: "z"
  T:
    distribution:
      type: "uniform"
      lower: 9500.0
      upper: 10500.0
    plot:
      lower: 9500.0
      upper: 10500.0
    latex: "T\\,[\\mathrm{K}]"
  L_bol:
    distribution:
      type: "uniform"
      lower: 1.0e9
      upper: 3.0e10
    plot:
      lower: 1.0e9
      upper: 3.0e10
    latex: "L_\\mathrm{bol}\\,[L_\\odot]"

constraints: {}
