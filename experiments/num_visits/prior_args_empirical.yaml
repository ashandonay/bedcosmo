# Empirical SED prior from DESI+EAZY KDE (ILR parameterization, v3).
# 11 isometric log-ratio coords f1..f11 (K-1 for K=12 templates) + log_c_scale + z.
# Rebuild: fit_sed_prior_kde.py on desi_eazy_empirical_weights.csv
#
# prior_dir: build directory containing sed_prior_kde_native.joblib and (for prior_source=flow)
# the sed_prior_flow_*.pt files. null = default $SCRATCH/bedcosmo/num_visits/empirical_prior.
# At runtime, trained runs load from artifacts/empirical/ instead.
prior_dir: null

# Prior source:
#   "flow" (default) -- draw the prior pool from the trained native normalizing flow and
#           use it as the prior density for entropy (native for transform_input=False;
#           gaussianized flow for transform_input=True).
#           Validated against the KDE: flow-vs-KDE A/B PASS, and H_prior=35.0 bits (24.3 nats)
#           confirmed to match in the eval pipeline.
#   "kde"  -- draw the pool from the frozen KDE plug-in instead (the pre-flow baseline; set
#           this for a KDE A/B comparison).
# The flow(s) (sed_prior_flow_native.pt / _gaussianized.pt) must exist in prior_dir.
# Train them with:
#   python -m bedcosmo.num_visits.empirical.prior_flow --space both
prior_source: flow

template_dir: null
template_param: "templates/fsps_full/fsps_QSF_12_v3.param"
prior_pool_size: 65536
prior_pool_seed: 7

parameters:
  f1:
    distribution:
      type: empirical
    plot: 
      lower: -8.0
      upper: 8.0
  f2:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f3:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f4:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f5:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f6:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f7:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f8:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f9:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f10:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  f11:
    distribution:
      type: empirical
    plot:
      lower: -8.0
      upper: 8.0
  log_c_scale:
    distribution:
      type: empirical
    plot:
      lower: 4.0
      upper: 10.5
  z:
    distribution:
      type: empirical
    plot:
      lower: 0.0
      upper: 1.75

constraints: {}
