# Empirical SED prior from DESI+EAZY KDE (ILR parameterization, v3).
# 11 isometric log-ratio coords f1..f11 (K-1 for K=12 templates) + log_c_scale + z.
# Rebuild: fit_sed_prior_kde.py on desi_eazy_empirical_weights.csv
#
# Optional override when snapshotting KDE at run creation (null = default scratch build).
# At runtime, trained runs load artifacts/empirical/sed_prior_kde.joblib instead.

prior_kde_source: null
eazy_templates_dir: null
eazy_param: "templates/fsps_full/fsps_QSF_12_v3.param"
prior_pool_size: 65536
prior_pool_seed: 7

parameters:
  f1:
    distribution:
      type: empirical
    plot: 
      lower: -8.0
      upper: 8.0
  f2:
    distribution:
