# Evaluation arguments for num_visits experiment

bb:
  cosmo_model: bb
  eval_step: last
  levels: [0.68, 0.95]
  guide_samples: 100000
  n_particles: 100001
  particle_batch_size: 10000
  n_evals: 10
  param_space: physical
  design_args_path: null
  design_chunk_size: 1
  profile: true
  verbose: true

bb_temp:
  cosmo_model: bb_temp
  eval_step: last
  levels: [0.68, 0.95]
  guide_samples: 100000
  n_particles: 100001
  particle_batch_size: 10000
  n_evals: 10
  param_space: physical
  design_args_path: null
  design_chunk_size: 1
  profile: true
  verbose: true

eazy_kde:
  cosmo_model: eazy_kde
  eval_step: last
  levels: [0.68, 0.95]
  guide_samples: 100000
  n_particles: 25          # or tune via CLI
  particle_batch_size: 10  # helps GPU memory for eazy
  n_evals: 5
  param_space: physical
  design_args_path: null
  design_chunk_size: 1
  profile: true
  verbose: true