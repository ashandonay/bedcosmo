# Keys are arbitrary (e.g. scaled_base). Use --nn-model <key> to select a block.
# If --nn-model is omitted, the key defaults to --cosmo-model (must exist below).

base:
  architecture: resnet
  hidden_dim: 24
  n_hidden: 6
  expand: 4
  dropout: 0.0
  lr: 1.0e-3
  final_lr_frac: 0.01
  weight_decay: 1.0e-5
  batch_size: 256
  warmup_fraction: 0.05
  scheduler_type: lambda
  lr_restarts: 10
  lr_gamma: 0.5
  grad_clip: 1.0

base_omegak_w_wa:
  architecture: resnet
  hidden_dim: 48
  n_hidden: 6
  expand: 4
  dropout: 0.0
  lr: 1.0e-3
  final_lr_frac: 0.01
  weight_decay: 1.0e-5
  batch_size: 256
  warmup_fraction: 0.05
  scheduler_type: lambda
  lr_restarts: 10
  lr_gamma: 1.0
  grad_clip: 1.0
